name: Build KivyMD Android APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 3.10 ─────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Locale fix (encoding errors avoid karne ke liye) ────────────────
      - name: Set locale
        run: |
          echo "LC_ALL=C.UTF-8" >> $GITHUB_ENV
          echo "LANG=C.UTF-8" >> $GITHUB_ENV

      # ── 4. System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git zip unzip curl wget \
            build-essential ccache \
            libffi-dev libssl-dev \
            libsqlite3-dev libbz2-dev \
            zlib1g-dev liblzma-dev \
            python3-dev python3-pip \
            openjdk-17-jdk \
            autoconf automake \
            libtool libltdl-dev \
            pkg-config cmake \
            libunwind-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      # ── 5. Java 17 set karo ────────────────────────────────────────────────
      - name: Set JAVA_HOME for Java 17
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV
          java -version

      # ── 6. Cache Buildozer ────────────────────────────────────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 7. Clean old cache (agar corrupt ho) ──────────────────────────────
      - name: Clean local buildozer cache
        run: |
          rm -rf .buildozer/android/platform/build-*
          rm -rf .buildozer/android/app

      # ── 8. Python packages ─────────────────────────────────────────────────
      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "Cython==0.29.33"
          pip install buildozer
          pip install python-for-android

      # ── 9. Pre-accept Android SDK licences ────────────────────────────────
      - name: Pre-accept Android SDK licences
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

      # ── 10. Build ──────────────────────────────────────────────────────────
      - name: Build APK with Buildozer
        run: yes | buildozer -v android debug

      # ── 11. List bin folder (debug) ────────────────────────────────────────
      - name: List bin folder
        run: ls -la bin/ || echo "bin folder empty hai!"

      # ── 12. Upload APK ─────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kivymd-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
