name: Build KivyMD Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # Required for Node.js 24 compatibility with older GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-22.04

    steps:
      # ──────────────────────────────────────────────────────────────
      # 1. Checkout source code
      # ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────────────────────
      # 2. Set up Python 3.10
      #    (3.11+ can cause issues with some p4a recipes; 3.10 is
      #    the most stable target for Kivy + Buildozer as of 2024)
      # ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ──────────────────────────────────────────────────────────────
      # 3. Install system dependencies
      #    These cover SDL2, ffmpeg, OpenSSL, libffi, and all native
      #    libs that python-for-android recipes may need.
      #    Missing packages are the #1 cause of "Exit code 100".
      # ──────────────────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            libsqlite3-dev \
            libgdbm-dev \
            libbz2-dev \
            liblzma-dev \
            libreadline-dev \
            tk-dev \
            python3-dev \
            python3-pip \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            ffmpeg \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libfreetype6-dev \
            libportmidi-dev \
            libjpeg-dev \
            libpng-dev \
            ccache \
            lld \
            build-essential \
            curl \
            wget

      # ──────────────────────────────────────────────────────────────
      # 4. Set up Java 17 (required for modern Android SDK / Gradle)
      # ──────────────────────────────────────────────────────────────
      - name: Set JAVA_HOME for Java 17
        run: |
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV
          java -version

      # ──────────────────────────────────────────────────────────────
      # 5. Cache Buildozer global directory
      #    Caches the Android SDK, NDK, and p4a build artefacts so
      #    subsequent runs don't re-download gigabytes of toolchains.
      # ──────────────────────────────────────────────────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ──────────────────────────────────────────────────────────────
      # 6. Cache pip packages
      # ──────────────────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # ──────────────────────────────────────────────────────────────
      # 7. Install Python build tools
      #    • Cython is pinned to <3.0 — Cython 3 broke many p4a
      #      recipes (especially those using the old cimport syntax).
      #    • buildozer must be installed AFTER cython to avoid a
      #      newer Cython being pulled in as a transitive dep.
      # ──────────────────────────────────────────────────────────────
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install "Cython<3.0"
          pip install buildozer
          pip install virtualenv

      # ──────────────────────────────────────────────────────────────
      # 8. Accept Android SDK licences non-interactively
      # ──────────────────────────────────────────────────────────────
      - name: Pre-accept Android SDK licences
        run: |
          mkdir -p ~/.buildozer/android/platform
          # Buildozer will auto-download the SDK; this ensures any
          # pre-existing SDK installation has its licences accepted.
          if [ -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
            yes | $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager \
              --licenses || true
          fi

      # ──────────────────────────────────────────────────────────────
      # 9. Build the APK
      #    • "yes |" automatically answers any interactive prompts
      #      (SDK licence, overwrite, etc.)
      #    • "-v" gives verbose output so failures are diagnosable.
      # ──────────────────────────────────────────────────────────────
      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug
        env:
          # Makes buildozer auto-accept the Android SDK licence
          BUILDOZER_ACCEPT_ANDROID_SDK_LICENSE: "yes"
          # Improves ccache hit rate across workflow runs
          CCACHE_DIR: ${{ github.workspace }}/.ccache

      # ──────────────────────────────────────────────────────────────
      # 10. Upload APK as a GitHub Actions artefact
      #     The APK lands in ./bin/ by default (controlled by
      #     bin_dir in buildozer.spec). Wildcard covers any variant
      #     name Buildozer generates.
      # ──────────────────────────────────────────────────────────────
      - name: Upload APK artefact
        uses: actions/upload-artifact@v4
        with:
          name: myapp-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 14

      # ──────────────────────────────────────────────────────────────
      # 11. (Optional) Show build summary
      # ──────────────────────────────────────────────────────────────
      - name: Print build summary
        if: always()
        run: |
          echo "=== APK files in ./bin ==="
          ls -lh bin/ 2>/dev/null || echo "No files found in bin/"
          echo "=== Buildozer log tail ==="
          tail -50 .buildozer/android/platform/build-*/dists/*/buildozer.spec.log \
            2>/dev/null || echo "Log file not found."
