name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build with Buildozer
        run: |
          docker run --rm -v ${{ github.workspace }}:/home/user/hostpython buildozer/buildozer --version
          docker run --rm -v ${{ github.workspace }}:/home/user/hostpython buildozer/buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: MatrixCalc-APK
          path: bin/*.apk
